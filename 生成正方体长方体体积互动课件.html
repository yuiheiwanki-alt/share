    &lt;style&gt;
        :root {
            --primary: #FF6A18;
            --secondary: #012103;
            --accent: #FFEF5A;
            --background: #F4F4F4;
            --foreground: #012103;
            --stage-bg: #158A60;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--background);
            color: var(--foreground);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        header {
            padding: 10px 20px;
            background: #fff;
            border-bottom: 2px solid rgba(0,0,0,0.1);
            flex-shrink: 0;
        }

        h1 {
            font-size: 40px !important;
            font-weight: 700 !important;
            margin: 0;
            color: var(--secondary);
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: row;
            gap: 20px;
            padding: 20px;
            min-height: 0;
        }

        #controls {
            width: 28%;
            min-width: 320px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            background: var(--background);
            flex-shrink: 0;
        }

        .control-block {
            background: white;
            padding: 16px;
            border: 1px solid rgba(0, 0, 0, 0.3);
            border-radius: 26px;
        }

        .label-group {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            font-size: 24px;
            font-weight: 600;
        }

        input[type=range] {
            width: 100%;
            height: 12px;
            background: #dadada;
            border-radius: 6px;
            appearance: none;
            -webkit-appearance: none;
            outline: none;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 28px;
            height: 28px;
            background: var(--primary);
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid white;
        }

        .btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .btn {
            height: 80px;
            font-size: 28px;
            font-weight: 500;
            border-radius: 26px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(0,0,0,0.3);
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-secondary {
            background: #dadada;
            color: var(--foreground);
        }

        .btn:active {
            transform: scale(0.96);
        }

        #stage {
            flex: 1;
            background: var(--stage-bg);
            border: 1px solid #789079;
            border-radius: 26px;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        canvas {
            width: 100% !important;
            height: 100% !important;
            display: block;
        }

        #formula-card {
            font-size: 24px;
            line-height: 1.4;
        }

        .stat-value {
            color: var(--primary);
            font-weight: 700;
        }

        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }
        .tab-btn {
            flex: 1;
            padding: 10px;
            font-size: 20px;
            border-radius: 12px;
            background: #eee;
            cursor: pointer;
            border: 1px solid #ccc;
        }
        .tab-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

    &lt;header&gt;
        &lt;h1&gt;長方體體積互動模擬器&lt;/h1&gt;
    &lt;/header&gt;

    &lt;main&gt;
        &lt;aside id=&quot;controls&quot;&gt;
            &lt;div class=&quot;tabs&quot;&gt;
                &lt;div class=&quot;tab-btn active&quot; onclick=&quot;switchTab('size')&quot;&gt;設定尺寸&lt;/div&gt;
                &lt;div class=&quot;tab-btn&quot; onclick=&quot;switchTab('fill')&quot;&gt;填滿操作&lt;/div&gt;
            &lt;/div&gt;

            &lt;div id=&quot;tab-size&quot; class=&quot;tab-content active&quot;&gt;
                &lt;div class=&quot;control-block&quot;&gt;
                    &lt;div class=&quot;label-group&quot;&gt;
                        &lt;span&gt;長 (L): &lt;span id=&quot;val-l&quot; class=&quot;stat-value&quot;&gt;4&lt;/span&gt; cm&lt;/span&gt;
                    &lt;/div&gt;
                    &lt;input type=&quot;range&quot; id=&quot;input-l&quot; min=&quot;1&quot; max=&quot;10&quot; value=&quot;4&quot; oninput=&quot;updateParams()&quot;&gt;
                &lt;/div&gt;
                &lt;div class=&quot;control-block&quot;&gt;
                    &lt;div class=&quot;label-group&quot;&gt;
                        &lt;span&gt;闊 (W): &lt;span id=&quot;val-w&quot; class=&quot;stat-value&quot;&gt;3&lt;/span&gt; cm&lt;/span&gt;
                    &lt;/div&gt;
                    &lt;input type=&quot;range&quot; id=&quot;input-w&quot; min=&quot;1&quot; max=&quot;10&quot; value=&quot;3&quot; oninput=&quot;updateParams()&quot;&gt;
                &lt;/div&gt;
                &lt;div class=&quot;control-block&quot;&gt;
                    &lt;div class=&quot;label-group&quot;&gt;
                        &lt;span&gt;高 (H): &lt;span id=&quot;val-h&quot; class=&quot;stat-value&quot;&gt;2&lt;/span&gt; cm&lt;/span&gt;
                    &lt;/div&gt;
                    &lt;input type=&quot;range&quot; id=&quot;input-h&quot; min=&quot;1&quot; max=&quot;10&quot; value=&quot;2&quot; oninput=&quot;updateParams()&quot;&gt;
                &lt;/div&gt;
                &lt;div class=&quot;control-block&quot;&gt;
                    &lt;div class=&quot;label-group&quot;&gt;
                        &lt;span&gt;積木邊長: &lt;span id=&quot;val-unit&quot; class=&quot;stat-value&quot;&gt;1&lt;/span&gt; cm&lt;/span&gt;
                    &lt;/div&gt;
                    &lt;input type=&quot;range&quot; id=&quot;input-unit&quot; min=&quot;1&quot; max=&quot;2&quot; step=&quot;1&quot; value=&quot;1&quot; oninput=&quot;updateParams()&quot;&gt;
                &lt;/div&gt;
            &lt;/div&gt;

            &lt;div id=&quot;tab-fill&quot; class=&quot;tab-content&quot;&gt;
                &lt;div class=&quot;btn-group&quot;&gt;
                    &lt;button class=&quot;btn btn-secondary&quot; onclick=&quot;fillStep('unit')&quot;&gt;逐個填&lt;/button&gt;
                    &lt;button class=&quot;btn btn-secondary&quot; onclick=&quot;fillStep('layer')&quot;&gt;逐層填&lt;/button&gt;
                    &lt;button class=&quot;btn btn-primary&quot; onclick=&quot;fillAll()&quot; style=&quot;grid-column: span 2;&quot;&gt;一鍵填滿&lt;/button&gt;
                    &lt;button class=&quot;btn btn-secondary&quot; onclick=&quot;resetFill()&quot; style=&quot;grid-column: span 2;&quot;&gt;重設積木&lt;/button&gt;
                &lt;/div&gt;
                &lt;div class=&quot;control-block mt-4&quot; id=&quot;formula-card&quot;&gt;
                    &lt;div id=&quot;math-output&quot;&gt;
                        積木總數：&lt;span id=&quot;block-count&quot; class=&quot;stat-value&quot;&gt;0&lt;/span&gt; 個&lt;br&gt;
                        體積計算：&lt;br&gt;
                        \[ V = L \times W \times H \]
                        &lt;div id=&quot;dynamic-formula&quot; style=&quot;margin-top: 10px; color: var(--primary);&quot;&gt;
                            \( V = 4 \times 3 \times 2 = 24 \text{ cm}^3 \)
                        &lt;/div&gt;
                    &lt;/div&gt;
                &lt;/div&gt;
            &lt;/div&gt;

        &lt;section id=&quot;stage&quot;&gt;
        &lt;/section&gt;

    &lt;script&gt;
        function switchTab(tab) {
            const btns = document.querySelectorAll('.tab-btn');
            const contents = document.querySelectorAll('.tab-content');
            btns.forEach(function(b) { b.classList.remove('active'); });
            contents.forEach(function(c) { c.classList.remove('active'); });
            event.target.classList.add('active');
            document.getElementById('tab-' + tab).classList.add('active');
        }

        const state = {
            L: 4,
            W: 3,
            H: 2,
            unitSize: 1,
            filledBlocks: [],
            isAnimating: false
        };

        let scene, camera, renderer, controls, ground, grid;
        let boxGroup;

        function initThree() {
            const stage = document.getElementById('stage');
            scene = new THREE.Scene();

            camera = new THREE.PerspectiveCamera(45, stage.clientWidth / stage.clientHeight, 0.1, 1000);
            camera.position.set(8, 7, 9);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(stage.clientWidth, stage.clientHeight);
            stage.appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.enablePan = false;
            controls.maxPolarAngle = Math.PI / 2 - 0.05;
            controls.minDistance = 5;
            controls.maxDistance = 30;

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
            scene.add(ambientLight);
            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.6);
            directionalLight.position.set(5, 10, 7);
            scene.add(directionalLight);

            const size = 16;
            const divisions = 16;
            ground = new THREE.Mesh(
                new THREE.PlaneGeometry(size, size),
                new THREE.MeshBasicMaterial({ color: 0xf7fdf6, transparent: true, opacity: 0.18, side: THREE.DoubleSide })
            );
            ground.rotation.x = -Math.PI / 2;
            ground.position.y = -0.012;
            ground.renderOrder = 1;
            scene.add(ground);

            grid = new THREE.GridHelper(size, divisions, 0x174a3a, 0x6fa58f);
            grid.position.y = 0.01;
            grid.renderOrder = 2;
            grid.material.transparent = true;
            grid.material.opacity = 0.72;
            grid.material.depthWrite = false;
            scene.add(grid);

            boxGroup = new THREE.Group();
            scene.add(boxGroup);

            window.__math3d = {
                scene: scene,
                camera: camera,
                renderer: renderer,
                controls: controls,
                ground: ground,
                grid: grid,
                hasGroundGrid: true
            };

            updateBox();
            animate();

            window.addEventListener('resize', function() {
                const w = stage.clientWidth;
                const h = stage.clientHeight;
                renderer.setSize(w, h);
                camera.aspect = w / h;
                camera.updateProjectionMatrix();
            });
        }

        function updateBox() {
            boxGroup.clear();
            state.filledBlocks = [];
            document.getElementById('block-count').innerText = 0;

            const geometry = new THREE.BoxGeometry(state.L, state.H, state.W);
            const edges = new THREE.EdgesGeometry(geometry);
            const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0x012103, linewidth: 2 }));
            
            line.position.y = state.H / 2;
            boxGroup.add(line);

            const boxMat = new THREE.MeshPhongMaterial({ color: 0xffffff, transparent: true, opacity: 0.1, side: THREE.DoubleSide });
            const boxMesh = new THREE.Mesh(geometry, boxMat);
            boxMesh.position.y = state.H / 2;
            boxGroup.add(boxMesh);

            controls.target.set(0, state.H / 2, 0);
            updateFormula();
        }

        function updateParams() {
            state.L = parseInt(document.getElementById('input-l').value);
            state.W = parseInt(document.getElementById('input-w').value);
            state.H = parseInt(document.getElementById('input-h').value);
            state.unitSize = parseInt(document.getElementById('input-unit').value);

            document.getElementById('val-l').innerText = state.L;
            document.getElementById('val-w').innerText = state.W;
            document.getElementById('val-h').innerText = state.H;
            document.getElementById('val-unit').innerText = state.unitSize;

            updateBox();
        }

        function createBlock(x, y, z) {
            const size = state.unitSize;
            const geometry = new THREE.BoxGeometry(size * 0.98, size * 0.98, size * 0.98);
            const material = new THREE.MeshPhongMaterial({ color: 0xFFEF5A, shininess: 30 });
            const mesh = new THREE.Mesh(geometry, material);
            
            mesh.position.set(
                -state.L/2 + x * size + size/2,
                y * size + size/2,
                -state.W/2 + z * size + size/2
            );

            const edges = new THREE.EdgesGeometry(geometry);
            const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0x9A6E02 }));
            mesh.add(line);

            return mesh;
        }

        async function fillStep(mode) {
            if (state.isAnimating) return;
            state.isAnimating = true;

            const nx = Math.floor(state.L / state.unitSize);
            const nz = Math.floor(state.W / state.unitSize);
            const ny = Math.floor(state.H / state.unitSize);

            if (mode === 'unit') {
                for (let y = 0; y &lt; ny; y++) {
                    for (let z = 0; z &lt; nz; z++) {
                        for (let x = 0; x &lt; nx; x++) {
                            const key = x + &quot;,&quot; + y + &quot;,&quot; + z;
                            if (!state.filledBlocks.includes(key)) {
                                const b = createBlock(x, y, z);
                                boxGroup.add(b);
                                state.filledBlocks.push(key);
                                document.getElementById('block-count').innerText = state.filledBlocks.length;
                                await sleep(50);
                                state.isAnimating = false;
                                return;
                            }
                        }
                    }
                }
            } else if (mode === 'layer') {
                for (let y = 0; y &lt; ny; y++) {
                    let layerAdded = false;
                    for (let z = 0; z &lt; nz; z++) {
                        for (let x = 0; x &lt; nx; x++) {
                            const key = x + &quot;,&quot; + y + &quot;,&quot; + z;
                            if (!state.filledBlocks.includes(key)) {
                                const b = createBlock(x, y, z);
                                boxGroup.add(b);
                                state.filledBlocks.push(key);
                                layerAdded = true;
                            }
                        }
                    }
                    if (layerAdded) {
                        document.getElementById('block-count').innerText = state.filledBlocks.length;
                        await sleep(100);
                        state.isAnimating = false;
                        return;
                    }
                }
            }
            state.isAnimating = false;
        }

        async function fillAll() {
            if (state.isAnimating) return;
            state.isAnimating = true;

            resetFill();
            const nx = Math.floor(state.L / state.unitSize);
            const nz = Math.floor(state.W / state.unitSize);
            const ny = Math.floor(state.H / state.unitSize);

            for (let y = 0; y &lt; ny; y++) {
                for (let z = 0; z &lt; nz; z++) {
                    for (let x = 0; x &lt; nx; x++) {
                        const b = createBlock(x, y, z);
                        boxGroup.add(b);
                        state.filledBlocks.push(x + &quot;,&quot; + y + &quot;,&quot; + z);
                    }
                }
                document.getElementById('block-count').innerText = state.filledBlocks.length;
                await sleep(100);
            }
            state.isAnimating = false;
        }

        function resetFill() {
            updateBox();
        }

        function sleep(ms) {
            return new Promise(function(resolve) { setTimeout(resolve, ms); });
        }

        function updateFormula() {
            const vol = state.L * state.W * state.H;
            const formulaDiv = document.getElementById('dynamic-formula');
            formulaDiv.innerHTML = &quot;\\( V = &quot; + state.L + &quot; \\times &quot; + state.W + &quot; \\times &quot; + state.H + &quot; = &quot; + vol + &quot; \\text{ cm}^3 \\)&quot;;
            if (window.MathJax) {
                MathJax.typesetPromise([formulaDiv]);
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            if (controls) controls.update();
            if (renderer &amp;&amp; scene &amp;&amp; camera) renderer.render(scene, camera);
        }

        window.onload = initThree;
    &lt;/script&gt;

  <script>

    function getIsMobile() {
      const width = document.documentElement.clientWidth
      const isMobile = /Android|webOS|iPhone|iPod|BlackBerry|iPad|Windows Phone|Mobile/i.test(navigator.userAgent) || width <= 768
      return isMobile
    }

    // 打开飞象老师官网
    function openFeixiangTeacher(event) {
      const isMobile = getIsMobile()

      // 判断是否为移动端浏览器
      if (isMobile) {
        // 移动端不跳转
        return
      }
      window.open('https://www.feixianglaoshi.com', '_blank')
    }


    // ==================== 埋点相关代码 ====================

    /**
     * 页面停留时长统计
     */
    (function () {
      let startTime = null
      let totalTime = 0
      let reportTimer = null // 防抖定时器

      // 开始计时
      function startTimer() {
        if (!startTime) {
          startTime = Date.now()
          console.log('[埋点] 开始计时')
        }
      }

      // 停止计时并累加时长
      function stopTimer() {
        if (startTime) {
          totalTime += Date.now() - startTime
          startTime = null
          console.log('[埋点] 停止计时，累计时长:', Math.floor(totalTime / 1000), '秒')
        }
      }

      // 检查页面是否真正可见
      function isPageVisible() {
        // 检查 document.hidden
        if (document.hidden) {
          return false
        }

        // 检查 document.visibilityState
        if (document.visibilityState && document.visibilityState !== 'visible') {
          return false
        }

        // 检查窗口是否有焦点
        if (!document.hasFocus()) {
          return false
        }

        return true
      }

      // 上报停留时长（带防抖）
      function reportStayTime(eventType, immediate = false) {
        stopTimer()

        // 清除之前的定时器
        if (reportTimer) {
          clearTimeout(reportTimer)
          reportTimer = null
        }

        // 如果是立即上报（如页面卸载），不使用防抖
        if (immediate) {
          doReport(eventType)
          return
        }

        // 使用防抖，避免短时间内多次上报
        // 100ms 内如果有多个事件触发，只上报最后一次
        reportTimer = setTimeout(function () {
          doReport(eventType)
          reportTimer = null
        }, 100)
      }

      // 实际执行上报
      function doReport(eventType) {
        if (window.frog && totalTime > 0) {
          const serverData = window.__SERVER_DATA__ || {}
          const chatId = serverData.watermarkChatId
          window.frog.add({
            url: '/time/HtmlPage/enter',
            eventId: 42818,
            customExtend: {
              chat_id: chatId,
              use_time: Math.floor(totalTime / 1000), // 转换为秒
            },
            duration: Math.floor(totalTime / 1000), // 转换为秒,
            currentPage: 'HtmlPage',
            eventAction: 'time',
            eventName: 'enter'
          })
          console.log(`[埋点] 页面停留时长上报 (${eventType}):`, Math.floor(totalTime / 1000), '秒')

          // 上报后重置累计时长，为下次统计做准备
          totalTime = 0
        }
      }

      // 清理函数：移除所有事件监听器
      function cleanup() {
        console.log('[埋点] 清理计时器资源')

        // 清除防抖定时器
        if (reportTimer) {
          clearTimeout(reportTimer)
          reportTimer = null
        }

        // 移除事件监听器
        document.removeEventListener('visibilitychange', handleVisibilityChange)
        window.removeEventListener('blur', handleBlur)
        window.removeEventListener('focus', handleFocus)
        window.removeEventListener('beforeunload', handleBeforeUnload)
        window.removeEventListener('pagehide', handlePageHide)

        // 重置变量
        startTime = null
        totalTime = 0
      }

      // 事件处理函数（需要命名以便移除）
      function handleVisibilityChange() {
        if (document.hidden) {
          // 页面不可见，停止计时并上报
          console.log('[埋点] visibilitychange - 页面隐藏')
          reportStayTime('visibilitychange')
        } else {
          // 页面可见，开始新的计时
          console.log('[埋点] visibilitychange - 页面显示，开始新的计时')
          startTimer()
        }
      }

      function handleBlur() {
        // 窗口失去焦点，停止计时并上报
        console.log('[埋点] blur - 窗口失去焦点')
        reportStayTime('blur')
      }

      function handleFocus() {
        // 窗口获得焦点，开始新的计时
        console.log('[埋点] focus - 窗口获得焦点，开始新的计时')
        startTimer()
      }

      function handleBeforeUnload() {
        // 页面卸载前立即上报（不使用防抖）
        console.log('[埋点] beforeunload - 页面即将卸载')
        reportStayTime('beforeunload', true)
        cleanup()
      }

      function handlePageHide() {
        // 页面隐藏时立即上报（iOS Safari 更可靠，不使用防抖）
        console.log('[埋点] pagehide - 页面隐藏')
        reportStayTime('pagehide', true)
      }

      function handleDOMContentLoaded() {
        if (isPageVisible()) {
          startTimer()
        }
      }

      // 监听页面可见性变化
      document.addEventListener('visibilitychange', handleVisibilityChange)

      // 监听窗口失去/获得焦点
      window.addEventListener('blur', handleBlur)
      window.addEventListener('focus', handleFocus)

      // 页面加载完成后开始计时
      if (document.readyState === 'loading') {
        window.addEventListener('DOMContentLoaded', handleDOMContentLoaded)
      } else {
        if (isPageVisible()) {
          startTimer()
        }
      }

      // 页面卸载时上报
      window.addEventListener('beforeunload', handleBeforeUnload)

      // 兼容性：监听 pagehide 事件（iOS Safari 更可靠）
      window.addEventListener('pagehide', handlePageHide)
    })()

    /**
     * 点击立即体验的埋点
     */
    function trackStartButtonClick(event) {
      // 阻止事件冒泡，避免触发 HTML 点击埋点
      event.stopPropagation()

      if (window.frog) {
        const serverData = window.__SERVER_DATA__ || {}
        const chatId = serverData.watermarkChatId
        console.log('trackHtmlClick', chatId)
        window.frog.add({
          url: '/click/HtmlPage/start',
          eventId: 42817,
          customExtend: {
            chat_id: chatId
          },

          eventAction: 'click',
          eventName: 'start'

    // 绑定点击事件
    document.addEventListener('DOMContentLoaded', function () {
      // 绑定 Logo 点击埋点和跳转功能
      const logoElement = document.querySelector('.left-watermark-content')
      if (logoElement) {
        logoElement.addEventListener('click', function (event) {
          trackLogoClick(event)
          openFeixiangTeacher(event)
        })
      }

      // 绑定立即体验按钮点击埋点和跳转功能
      const startButton = document.querySelector('.jump-button')
      if (startButton) {
        startButton.addEventListener('click', function (event) {
          trackStartButtonClick(event)
          openFeixiangTeacher(event)
        })
      }

      // 绑定水印覆盖层点击（整体区域）
      const watermarkOverlay = document.querySelector('.watermark-overlay')
      if (watermarkOverlay) {
        watermarkOverlay.addEventListener('click', function (event) {
          // 如果点击的不是 logo 或按钮，则触发跳转
          const target = event.target
          const isLogo = target.closest('.left-watermark-content')
          const isButton = target.closest('.jump-button')

          if (!isLogo && !isButton) {
            openFeixiangTeacher(event)
          }
        })
      }
    })

    // ==================== 原有功能代码 ====================

    function adjustRem() {
      const pcBaseWidth = 375 // 设计稿
      const width = document.documentElement.clientWidth
      document.documentElement.style.fontSize = `${(width / pcBaseWidth * 100).toFixed(2)}px`
    }


    // 移动端检测和按钮隐藏逻辑
    function checkAndHideButtonOnMobile() {
      const isMobile = getIsMobile()
      if (isMobile) {
        adjustRem()
      }
      const jumpButton = document.querySelector('.right-watermark-content .jump-button');
      const iframeContainer = document.querySelector('.iframe-container');

      if (isMobile && jumpButton) {
        jumpButton.style.display = 'none';
      } else {
        jumpButton.style.display = 'flex'
      }

      // 移动端时给iframe-container添加类名，否则移除类名
      if (iframeContainer) {
        if (isMobile) {
          iframeContainer.classList.add('mobile');
        } else {
          iframeContainer.classList.remove('mobile');
        }
      }
    }


    function handleResize() {
      // 响应式处理：重新检测移动端并处理按钮显示/隐藏
      checkAndHideButtonOnMobile();

      // 在窗口大小变化时，重新应用移动端相关的逻辑
      const isMobile = getIsMobile()
      const watermarkOverlay = document.querySelector('.watermark-overlay');
      const iframeContainer = document.querySelector('.iframe-container');

      // 根据当前设备类型调整水印覆盖层的点击行为
      if (watermarkOverlay) {
        if (isMobile) {
          // 移动端：移除点击事件或设置为空函数
          watermarkOverlay.onclick = function () {
            // 移动端不执行跳转
            return;
          };
        } else {
          // 桌面端：恢复正常的点击跳转功能
          watermarkOverlay.onclick = openFeixiangTeacher;
        }
      }

      // 确保在resize时也能正确添加或移除mobile类
      if (iframeContainer) {
        if (isMobile) {
          iframeContainer.classList.add('mobile');
        } else {
          iframeContainer.classList.remove('mobile');
        }
      }
    }

    // 防止iframe内容溢出
    window.addEventListener('resize', handleResize);

    // 页面加载完成后执行移动端检测
    document.addEventListener('DOMContentLoaded', checkAndHideButtonOnMobile);

    // 清理所有事件绑定的函数
    function clearAllEvents() {
      // 清除 resize 事件监听器
      window.removeEventListener('resize', handleResize);

      // 清除 DOMContentLoaded 事件监听器
      document.removeEventListener('DOMContentLoaded', checkAndHideButtonOnMobile);
    }

    // 页面卸载时自动清理事件（可选）
    window.addEventListener('beforeunload', clearAllEvents);

  </script>
