    &lt;style&gt;
        :root {
            --primary: #FF7B50;
            --secondary: #EEEEEE;
            --accent: #E93D7E;
            --background: #E3E3E3;
            --foreground: #2F0400;
            --card-bg: #EEEEEE;
            --btn-main: #FF7B50;
            --btn-border: #E13120;
            --btn-secondary: #EEEEEE;
            --btn-secondary-border: #989898;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0; padding: 0;
            width: 100vw; height: 100vh;
            display: flex; flex-direction: column;
            background-color: var(--background);
            color: var(--foreground);
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            overflow: hidden;
            touch-action: none;
        }

        header {
            height: 80px;
            display: flex; align-items: center; justify-content: center;
            background-color: var(--secondary);
            border-bottom: 2px solid var(--btn-secondary-border);
            flex-shrink: 0;
        }

        h1 { margin: 0; font-size: 40px; font-weight: 700 !important; color: var(--foreground); }

        main {
            flex: 1; display: flex; flex-direction: row; gap: 20px; padding: 20px;
            overflow: hidden;
        }

        #controls {
            width: 28%; min-width: 280px;
            display: flex; flex-direction: column; gap: 20px;
            background-color: var(--card-bg);
            border: 1px solid rgba(20,20,20,0.3);
            border-radius: 20px; padding: 20px;
            flex-shrink: 0;
        }

        #stage {
            flex: 1; display: flex; align-items: center; justify-content: center;
            position: relative; background: #EEEEEE;
            border: 1px solid #A2A2A2; border-radius: 20px;
            overflow: hidden;
        }

        .sudoku-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(4, 1fr);
            gap: 4px;
            background-color: #CD8702;
            border: 5px solid #FEFA4C;
            border-radius: 12px;
            padding: 4px;
            width: 80vh; max-width: 500px;
            aspect-ratio: 1/1;
        }

        .cell {
            background-color: #fff;
            display: flex; align-items: center; justify-content: center;
            border-radius: 4px; font-size: 0;
        }
        .cell[data-col=&quot;1&quot;] { border-right: 4px solid #CD8702; }
        .cell[data-row=&quot;1&quot;] { border-bottom: 4px solid #CD8702; }
        .cell.fixed { background-color: #F0F0F0; }
        .cell img { width: 85%; height: 85%; object-fit: contain; pointer-events: none; }

        .control-block { display: flex; flex-direction: column; gap: 10px; }
        .label { font-size: 24px; font-weight: 600; }

        .level-btn {
            aspect-ratio: 1/1; border: 2px solid #989898; border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; background: #fff; font-size: 20px;
        }
        .level-btn.active { background: var(--btn-main); border-color: var(--btn-border); font-weight: bold; }

        .doll-bank { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .bank-item {
            aspect-ratio: 1/1; border: 3px solid #989898; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            background: #fff; cursor: grab;
        }
        .bank-item img { width: 80%; height: 80%; object-fit: contain; pointer-events: none; }

        .btn {
            height: 80px; width: 100%; font-size: 28px; font-weight: 500;
            border-radius: 20px; border: 3px solid var(--btn-border);
            background-color: var(--btn-main); color: var(--foreground);
            cursor: pointer;
        }
        .btn.secondary { background-color: var(--btn-secondary); border-color: var(--btn-secondary-border); }

        /* iPad Landscape/Portrait adapt */
        @media (max-aspect-ratio: 1/1) {
            main { flex-direction: column; }
            #controls { width: 100%; height: auto; flex-direction: row; flex-wrap: wrap; }
            .control-block { flex: 1; min-width: 200px; }
            .sudoku-grid { width: 60vw; }
        }

        .dragging { position: fixed !important; z-index: 10000; pointer-events: none; transform: scale(1.1); }
        .wrong-bg { background-color: #ffcccc !important; }

                { puzzle: [[1, 0, 0, 2], [0, 0, 0, 0], [0, 0, 3, 0], [4, 0, 0, 0]], name: &quot;Unstoppable&quot; },
                { puzzle: [[0, 0, 3, 0], [0, 1, 0, 2], [0, 0, 4, 0], [2, 0, 0, 0]], name: &quot;Great Strategy&quot; },
                { puzzle: [[0, 0, 0, 4], [0, 2, 3, 0], [0, 0, 0, 0], [1, 0, 0, 0]], name: &quot;Master&quot; }
            ];
            const dollUrls = {
                1: &quot;https://musk-online.fbcontent.cn/pub-musk-ai-studio/user/upload/20/wRs3xGuVax6xhSN5snZq3h.jpg&quot;,
                2: &quot;https://musk-online.fbcontent.cn/pub-musk-ai-studio/user/upload/20/P33VRTRUpdpiXWs5dBpRX5.jpg&quot;,
                3: &quot;https://musk-online.fbcontent.cn/pub-musk-ai-studio/user/upload/20/qkxJ4wZeF7qA8cuc8c7x84.jpg&quot;,
                4: &quot;https://musk-online.fbcontent.cn/pub-musk-ai-studio/user/upload/20/teFYZj9twJBqZqCqZtthpB.jpg&quot;
            };

            let curLvl = 0;
            const grid = document.getElementById('grid');
            const lvlTxt = document.getElementById('lvl-txt');
            const selector = document.getElementById('lvl-select');
            const checkBtn = document.getElementById('check-btn');

            function loadLevel(idx) {
                curLvl = idx;
                grid.innerHTML = '';
                const data = levels[idx];
                lvlTxt.innerText = `Level ${idx+1}: ${data.name}`;
                for(let r=0; r&lt;4; r++) {
                    for(let c=0; c&lt;4; c++) {
                        const cell = document.createElement('div');
                        cell.className = 'cell' + (data.puzzle[r][c] ? ' fixed' : ' drop-zone');
                        cell.dataset.row = r; cell.dataset.col = c;
                        if(data.puzzle[r][c]) {
                            cell.innerHTML = `&lt;img src=&quot;${dollUrls[data.puzzle[r][c]]}&quot;&gt;`;
                            cell.dataset.type = data.puzzle[r][c];
                        }
                        grid.appendChild(cell);
                    }
                }
                updateBtn();
                renderSelector();
            }

            function renderSelector() {
                selector.innerHTML = '';
                levels.forEach((_, i) =&gt; {
                    const b = document.createElement('div');
                    b.className = 'level-btn' + (i === curLvl ? ' active' : '');
                    b.innerText = i + 1;
                    b.onclick = () =&gt; loadLevel(i);
                    selector.appendChild(b);
                });
            }

            function updateBtn() {
                const filled = Array.from(document.querySelectorAll('.cell')).every(c =&gt; c.dataset.type);
                checkBtn.style.opacity = filled ? '1' : '0.5';
            }

            // Simple Drag Logic
            let dragEl = null, ox=0, oy=0;
            document.addEventListener('pointerdown', e =&gt; {
                const el = e.target.closest('[data-drag]');
                if(!el || el.classList.contains('fixed')) return;
                const rect = el.getBoundingClientRect();
                dragEl = el.cloneNode(true);
                dragEl.classList.add('dragging');
                dragEl.style.width = rect.width + 'px';
                dragEl.style.height = rect.height + 'px';
                dragEl.style.left = rect.left + 'px';
                dragEl.style.top = rect.top + 'px';
                if(el.classList.contains('cell')) { el.innerHTML=''; delete el.dataset.type; el.removeAttribute('data-drag'); }
                ox = e.clientX - rect.left; oy = e.clientY - rect.top;
                document.body.appendChild(dragEl);
                dragEl.setPointerCapture(e.pointerId);
            });
            document.addEventListener('pointermove', e =&gt; {
                if(!dragEl) return;
                dragEl.style.left = (e.clientX - ox) + 'px';
                dragEl.style.top = (e.clientY - oy) + 'px';
            });
            document.addEventListener('pointerup', e =&gt; {
                if(!dragEl) return;
                dragEl.style.pointerEvents = 'none';
                const hit = document.elementFromPoint(e.clientX, e.clientY);
                const zone = hit &amp;&amp; hit.closest('.drop-zone');
                if(zone) {
                    zone.dataset.type = dragEl.dataset.type;
                    zone.innerHTML = `&lt;img src=&quot;${dollUrls[dragEl.dataset.type]}&quot;&gt;`;
                    zone.setAttribute('data-drag', '');
                }
                dragEl.remove(); dragEl = null; updateBtn();
            });

            checkBtn.onclick = () =&gt; {
                const b = Array(4).fill().map(() =&gt; Array(4).fill(0));
                document.querySelectorAll('.cell').forEach(c =&gt; b[c.dataset.row][c.dataset.col] = parseInt(c.dataset.type));
                const validate = arr =&gt; new Set(arr).size === 4;
                let win = true;
                for(let i=0; i&lt;4; i++) {
                    if(!validate(b[i])) win = false;
                    if(!validate([b[0][i], b[1][i], b[2][i], b[3][i]])) win = false;
                }
                for(let r=0; r&lt;4; r+=2) for(let c=0; c&lt;4; c+=2) {
                    if(!validate([b[r][c], b[r][c+1], b[r+1][c], b[r+1][c+1]])) win = false;
                }
                if(win) document.getElementById('success-modal').style.display='flex';
                else alert(&quot;Check again! There's a conflict.&quot;);
            };

            loadLevel(0);
        })();
    &lt;/script&gt;
