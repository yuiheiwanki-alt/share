    &lt;!-- spec: requirements=4x4数独,人教版三年级数学,四个公仔; core-loop=拖拽公仔-&gt;移动-&gt;释放-&gt;命中判定(对错)-&gt;吸附/弹回-&gt;对错即时显示-&gt;全部完成提示; forbid=base64,非飞象域URL; palette=A-02; layout=L1; count=1; grid_intent=explicit_plane_grid_or_dot; h1=40px; btn=80px; font=28px; --&gt;

    &lt;style&gt;
        :root {
            --primary: #FF8F00;
            --secondary: #FFF3E0;
            --accent: #4CAF50;
            --background: #FFFFFF;
            --foreground: #333333;
            --grid-line: #FFCC80;
            --correct: #4CAF50;
            --wrong: #F44336;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background-color: var(--background);
            color: var(--foreground);
            font-family: &quot;PingFang SC&quot;, &quot;Microsoft YaHei&quot;, sans-serif;
            overflow: hidden;
            /* 🔒 模板 C-2 必抄三件套 */
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
        }

        header {
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--secondary);
            border-bottom: 2px solid var(--grid-line);
        }

        h1 {
            margin: 0;
            font-size: 40px; /* 数学 H1=40px */
            font-weight: 700 !important;
            color: var(--primary);
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding: 20px;
        }

        #stage {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* 数独网格容器 */
        .sudoku-grid {
            display: grid;
            grid-template-columns: repeat(4, 100px);
            grid-template-rows: repeat(4, 100px);
            gap: 4px;
            background-color: var(--grid-line);
            border: 4px solid var(--primary);
            border-radius: 12px;
            padding: 4px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .cell {
            width: 100px;
            height: 100px;
            background-color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            border-radius: 4px;
        }

        /* 田字格粗线 */
        .cell[data-col=&quot;1&quot;] { border-right: 4px solid var(--primary); }
        .cell[data-row=&quot;1&quot;] { border-bottom: 4px solid var(--primary); }
        .cell[data-col=&quot;2&quot;] { border-left: 2px solid var(--primary); }
        .cell[data-row=&quot;2&quot;] { border-top: 2px solid var(--primary); }

        .cell.fixed {
            background-color: #FAFAFA;
        }

        .cell img {
            width: 80%;
            height: 80%;
            object-fit: contain;
            pointer-events: none;
        }

        /* 状态标记 - 删除原有的即时反馈样式 */
        .cell.wrong-bg {
            background-color: #ffebee !important;
        }

        /* 备选区 */
        #controls {
            height: 140px;
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: center;
            gap: 30px;
            background-color: var(--secondary);
            border-top: 1px solid var(--grid-line);
            padding: 0 20px;
        }

        .bank-item {
            width: 80px;
            height: 80px;
            background: #fff;
            border: 2px solid var(--primary);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: grab;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .bank-item:active {
            cursor: grabbing;
        }

        .bank-item img {
            width: 80%;
            height: 80%;
            object-fit: contain;
            pointer-events: none;
        }

        /* 拖拽态 */
        .dragging {
            z-index: 10000 !important;
            box-shadow: 0 8px 25px rgba(0,0,0,0.2) !important;
            transform: scale(1.1);
            transition: none !important;
            cursor: grabbing !important;
        }

        /* 按钮样式 */
        .btn {
            height: 80px;
            padding: 0 40px;
            font-size: 28px;
            font-weight: 500;
            border-radius: 40px;
            border: none;
            background-color: var(--primary);
            color: white;
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(0,0,0,0.15);
            transition: transform 0.2s, opacity 0.2s;
        }

        .btn:active {
            transform: scale(0.95);
        }

        /* 抖动动画 */
        @keyframes wrong-shake {
            0%, 100% { transform: translateX(0); }
            25%      { transform: translateX(-8px); }
            75%      { transform: translateX(8px); }
        }
        .wrong-shake { animation: wrong-shake 0.4s ease-in-out; }

        /* 完成弹窗 */
        #success-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: 20000;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: #fff;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            max-width: 80%;
        }

        /* 顶部进度条 */
        #progress-bar {
            width: 100%;
            height: 8px;
            background-color: var(--grid-line);
            position: relative;
        }
        #progress-fill {
            width: 10%;
            height: 100%;
            background-color: var(--primary);
            transition: width 0.3s ease;
        }

        /* 关卡标识 */
        #level-indicator {
            font-size: 24px;
            color: var(--foreground);
            font-weight: bold;
            margin-bottom: 10px;
        }

        /* 下一关按钮遮罩 */
        #next-level-mask {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.85);
            z-index: 5000;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
        }

        .modal-content h2 {
            font-size: 36px;
            color: var(--primary);
            margin-top: 0;
        }
    &lt;/style&gt;

    &lt;header&gt;

            &lt;div class=&quot;sudoku-grid&quot; id=&quot;grid&quot;&gt;
                &lt;!-- 4x4 网格由 JS 生成 --&gt;
            &lt;/div&gt;
            &lt;div id=&quot;next-level-mask&quot;&gt;
                &lt;p style=&quot;font-size: 32px; color: var(--accent); font-weight: bold; margin-bottom: 20px;&quot;&gt;太棒了！本关已通过！&lt;/p&gt;
                &lt;button class=&quot;btn&quot; id=&quot;next-level-btn&quot;&gt;进入下一关&lt;/button&gt;
            &lt;/div&gt;
        &lt;/div&gt;

    &lt;div id=&quot;controls&quot;&gt;
        &lt;!-- 备选公仔 --&gt;
        &lt;div class=&quot;bank-item&quot; data-drag data-type=&quot;1&quot;&gt;
            &lt;img src=&quot;https://musk-online.fbcontent.cn/pub-musk-ai-studio/user/upload/20/wRs3xGuVax6xhSN5snZq3h.jpg&quot; alt=&quot;望&quot;&gt;
        &lt;/div&gt;
        &lt;div class=&quot;bank-item&quot; data-drag data-type=&quot;2&quot;&gt;
            &lt;img src=&quot;https://musk-online.fbcontent.cn/pub-musk-ai-studio/user/upload/20/P33VRTRUpdpiXWs5dBpRX5.jpg&quot; alt=&quot;信&quot;&gt;
        &lt;/div&gt;
        &lt;div class=&quot;bank-item&quot; data-drag data-type=&quot;3&quot;&gt;
            &lt;img src=&quot;https://musk-online.fbcontent.cn/pub-musk-ai-studio/user/upload/20/qkxJ4wZeF7qA8cuc8c7x84.jpg&quot; alt=&quot;爱&quot;&gt;
        &lt;/div&gt;
        &lt;div class=&quot;bank-item&quot; data-drag data-type=&quot;4&quot;&gt;
            &lt;img src=&quot;https://musk-online.fbcontent.cn/pub-musk-ai-studio/user/upload/20/teFYZj9twJBqZqCqZtthpB.jpg&quot; alt=&quot;真2&quot;&gt;
        &lt;/div&gt;
        &lt;button class=&quot;btn&quot; id=&quot;submit-btn&quot; style=&quot;opacity: 0.5; cursor: not-allowed;&quot;&gt;核对答案&lt;/button&gt;
        &lt;button class=&quot;btn&quot; onclick=&quot;location.reload()&quot; style=&quot;background-color: #757575;&quot;&gt;重置全关&lt;/button&gt;
    &lt;/div&gt;

    &lt;div id=&quot;success-modal&quot;&gt;
        &lt;div class=&quot;modal-content&quot;&gt;
            &lt;h2&gt;🎉 恭喜完成！&lt;/h2&gt;
            &lt;p style=&quot;font-size: 24px;&quot;&gt;你真棒！成功解决了这个数独难题。&lt;/p&gt;
            &lt;button class=&quot;btn&quot; onclick=&quot;location.reload()&quot;&gt;再玩一次&lt;/button&gt;
        &lt;/div&gt;
    &lt;/div&gt;

    &lt;script&gt;
        (function() {
            // 4x4 数独 10 个关卡数据
            const levels = [
                { puzzle: [[1, 2, 3, 0], [3, 4, 1, 0], [2, 1, 4, 0], [0, 3, 2, 1]], name: &quot;牛刀小试&quot; },
                { puzzle: [[1, 0, 0, 4], [0, 4, 1, 0], [0, 1, 4, 0], [4, 0, 0, 1]], name: &quot;渐入佳境&quot; },
                { puzzle: [[0, 2, 0, 4], [4, 0, 2, 0], [0, 4, 0, 2], [2, 0, 4, 0]], name: &quot;旗开得胜&quot; },
                { puzzle: [[1, 0, 3, 0], [0, 0, 0, 2], [3, 0, 0, 0], [0, 4, 0, 1]], name: &quot;得心应手&quot; },
                { puzzle: [[0, 0, 1, 2], [1, 2, 0, 0], [0, 0, 3, 4], [3, 4, 0, 0]], name: &quot;智勇双全&quot; },
                { puzzle: [[1, 2, 0, 0], [0, 0, 1, 2], [2, 1, 0, 0], [0, 0, 2, 1]], name: &quot;游刃有余&quot; },
                { puzzle: [[0, 1, 0, 0], [0, 0, 2, 0], [0, 3, 0, 0], [0, 0, 0, 4]], name: &quot;百战百胜&quot; },
                { puzzle: [[1, 0, 0, 0], [0, 2, 0, 0], [0, 0, 3, 0], [0, 0, 0, 4]], name: &quot;势如破竹&quot; },
                { puzzle: [[0, 0, 3, 0], [0, 1, 0, 0], [0, 0, 4, 0], [2, 0, 0, 0]], name: &quot;大展经纶&quot; },
                { puzzle: [[0, 0, 0, 4], [0, 0, 3, 0], [0, 2, 0, 0], [1, 0, 0, 0]], name: &quot;登峰造极&quot; }
            ];

            let currentLevelIdx = 0;

            const dollUrls = {
                1: &quot;https://musk-online.fbcontent.cn/pub-musk-ai-studio/user/upload/20/wRs3xGuVax6xhSN5snZq3h.jpg&quot;,
                2: &quot;https://musk-online.fbcontent.cn/pub-musk-ai-studio/user/upload/20/P33VRTRUpdpiXWs5dBpRX5.jpg&quot;,
                3: &quot;https://musk-online.fbcontent.cn/pub-musk-ai-studio/user/upload/20/qkxJ4wZeF7qA8cuc8c7x84.jpg&quot;,
                4: &quot;https://musk-online.fbcontent.cn/pub-musk-ai-studio/user/upload/20/teFYZj9twJBqZqCqZtthpB.jpg&quot;
            };

            const gridContainer = document.getElementById('grid');
            const levelIndicator = document.getElementById('level-indicator');
            const progressFill = document.getElementById('progress-fill');
            const nextLevelMask = document.getElementById('next-level-mask');
            const nextLevelBtn = document.getElementById('next-level-btn');
            const submitBtn = document.getElementById('submit-btn');

            function handleWrong(el) {
                // 必检 #17：克隆体销毁动画
                el.classList.add('wrong-shake');
                setTimeout(() =&gt; el.remove(), 400);
            }

            function forceResetActive() {
                if (activeEl) activeEl.remove();
                activeEl = null;
                activePid = null;
            }

            function initLevel(idx) {
                gridContainer.innerHTML = '';
                nextLevelMask.style.display = 'none';
                submitBtn.style.opacity = '0.5';
                submitBtn.style.cursor = 'not-allowed';
                const levelData = levels[idx];
                levelIndicator.innerText = `第 ${idx + 1} / 10 关：${levelData.name}`;
                progressFill.style.width = `${((idx + 1) / 10) * 100}%`;

                for (let r = 0; r &lt; 4; r++) {
                    for (let c = 0; c &lt; 4; c++) {
                        const val = levelData.puzzle[r][c];
                        const cell = document.createElement('div');
                        cell.className = 'cell' + (val !== 0 ? ' fixed' : ' drop-zone');
                        cell.dataset.row = r;
                        cell.dataset.col = c;
                        
                        if (val !== 0) {
                            const img = document.createElement('img');
                            img.src = dollUrls[val];
                            cell.appendChild(img);
                            cell.dataset.type = val;
                        }
                        
                        gridContainer.appendChild(cell);
                    }
                }
            }

            nextLevelBtn.onclick = () =&gt; {
                if (currentLevelIdx &lt; 9) {
                    currentLevelIdx++;
                    initLevel(currentLevelIdx);
                }
            };

            initLevel(currentLevelIdx);

            // 🔒 模板 C-2 核心拖拽逻辑
            let activeEl = null, activePid = null, offsetX = 0, offsetY = 0;
            let originalParent = null, originalNext = null;
            let isCloned = false;

            document.addEventListener('pointerdown', (e) =&gt; {
                const el = e.target.closest('[data-drag]');
                if (!el) return;

                // 如果是从网格中拖拽（非 fixed 且已有 type）
                const isFromGrid = el.classList.contains('cell') &amp;&amp; !el.classList.contains('fixed');
                
                // 必检 #16 状态守卫
                if (activeEl) forceResetActive();

                const rect = el.getBoundingClientRect();
                let clone;

                if (isFromGrid) {
                    // 从网格移动：直接&ldquo;提走&rdquo;原有的东西，并清空该格状态
                    clone = el.cloneNode(true);
                    el.innerHTML = '';
                    delete el.dataset.type;
                    el.removeAttribute('data-drag');
                    el.classList.remove('wrong-bg');
                    isCloned = false; // 标记不是从备选区克隆的，而是&ldquo;移动&rdquo;
                } else {
                    // 从备选区拖拽：克隆一个
                    clone = el.cloneNode(true);
                    isCloned = true;
                }
                
                activeEl = clone;
                activePid = e.pointerId;
                originalParent = el.parentNode;
                originalNext = el.nextSibling;
                isCloned = true;

                offsetX = e.clientX - rect.left;
                offsetY = e.clientY - rect.top;

                // 必检 #10 浮起
                activeEl.style.width = rect.width + 'px';
                activeEl.style.height = rect.height + 'px';
                activeEl.style.position = 'fixed';
                activeEl.style.left = rect.left + 'px';
                activeEl.style.top = rect.top + 'px';
                activeEl.classList.add('dragging');
                document.body.appendChild(activeEl);

                // 必检 #4 capture
                activeEl.setPointerCapture(e.pointerId);
            });

            document.addEventListener('pointermove', (e) =&gt; {
                if (!activeEl || e.pointerId !== activePid) return;
                activeEl.style.left = (e.clientX - offsetX) + 'px';
                activeEl.style.top = (e.clientY - offsetY) + 'px';
            });

            document.addEventListener('pointerup', (e) =&gt; {
                if (!activeEl || e.pointerId !== activePid) return;

                // 必检 #8 + #9 elementFromPoint
                activeEl.style.pointerEvents = 'none';
                const hit = document.elementFromPoint(e.clientX, e.clientY);
                activeEl.style.pointerEvents = '';

                const zone = hit &amp;&amp; hit.closest('.drop-zone');
                const type = parseInt(activeEl.dataset.type);

                activeEl.releasePointerCapture(e.pointerId);
                activeEl.classList.remove('dragging');

                if (zone) {
                    const type = parseInt(activeEl.dataset.type);
                    
                    // 填入公仔，但不做即时规则判定
                    zone.innerHTML = '';
                    const finalImg = document.createElement('img');
                    finalImg.src = dollUrls[type];
                    zone.appendChild(finalImg);
                    zone.dataset.type = type;
                    // 让填入的公仔也具备拖拽属性
                    zone.setAttribute('data-drag', 'true');
                    
                    // 🔒 必检 #11：清理克隆体
                    const elToRemove = activeEl;
                    elToRemove.remove();

                    // 更新提交按钮状态
                    updateSubmitBtnStatus();
                } else {
                    handleWrong(activeEl);
                }

                activeEl = null;
                activePid = null;
            });

            document.addEventListener('pointercancel', (e) =&gt; {
                if (!activeEl || e.pointerId !== activePid) return;
                activeEl.remove();
                activeEl = null;
                activePid = null;
            });

            function updateSubmitBtnStatus() {
                if (isAllFilled()) {
                    submitBtn.style.opacity = '1';
                    submitBtn.style.cursor = 'pointer';
                } else {
                    submitBtn.style.opacity = '0.5';
                    submitBtn.style.cursor = 'not-allowed';
                }
            }

            submitBtn.onclick = () =&gt; {
                if (!isAllFilled()) return;

                if (checkFullBoard()) {
                    if (currentLevelIdx &lt; 9) {
                        nextLevelMask.style.display = 'flex';
                    } else {
                        document.getElementById('success-modal').style.display = 'flex';
                    }
                } else {
                    // 核对错误，图案不消失，让学生可以更改
                    showWrongFeedback();
                }
            };

            function isAllFilled() {
                return Array.from(document.querySelectorAll('.cell')).every(c =&gt; c.dataset.type);
            }

            function checkFullBoard() {
                const cells = document.querySelectorAll('.cell');
                const board = Array(4).fill().map(() =&gt; Array(4).fill(0));
                
                cells.forEach(c =&gt; {
                    const r = parseInt(c.dataset.row);
                    const col = parseInt(c.dataset.col);
                    board[r][col] = parseInt(c.dataset.type);
                });

                // 校验数独规则
                for (let i = 0; i &lt; 4; i++) {
                    const rowSet = new Set(), colSet = new Set();
                    for (let j = 0; j &lt; 4; j++) {
                        if (rowSet.has(board[i][j]) || colSet.has(board[j][i])) return false;
                        rowSet.add(board[i][j]);
                        colSet.add(board[j][i]);
                    }
                }
                // 校验宫格
                for (let r = 0; r &lt; 4; r += 2) {
                    for (let c = 0; c &lt; 4; c += 2) {
                        const blockSet = new Set();
                        for (let i = 0; i &lt; 2; i++) {
                            for (let j = 0; j &lt; 2; j++) {
                                if (blockSet.has(board[r+i][c+j])) return false;
                                blockSet.add(board[r+i][c+j]);
                            }
                        }
                    }
                }
                return true;
            }

            function showWrongFeedback() {
                // 变红提示，但不重置 initLevel
                document.querySelectorAll('.cell:not(.fixed)').forEach(c =&gt; {
                    c.classList.add('wrong-bg');
                });
                
                setTimeout(() =&gt; {
                    alert(&quot;哎呀，答案中还有一些小冲突哦！请仔细检查并修改一下。&quot;);
                    document.querySelectorAll('.cell').forEach(c =&gt; c.classList.remove('wrong-bg'));
                }, 1000);
            }

            // 辅助：处理直接拖到网格外的销毁（如果原本是网格里的，拖到外面等于删除）
            function handleWrong(el) {
                el.classList.add('wrong-shake');
                setTimeout(() =&gt; {
                    el.remove();
                    updateSubmitBtnStatus();
                }, 400);
            }
        })();
